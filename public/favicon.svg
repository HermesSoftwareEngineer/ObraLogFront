<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" fill="#F97316" rx="48"/>
  
  <!-- Grid lines representing a construction plan -->
  <g stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Vertical lines -->
    <line x1="48" y1="48" x2="48" y2="144"/>
    <line x1="96" y1="48" x2="96" y2="144"/>
    <line x1="144" y1="48" x2="144" y2="144"/>
    
    <!-- Horizontal lines -->
    <line x1="48" y1="72" x2="144" y2="72"/>
    <line x1="48" y1="96" x2="144" y2="96"/>
    <line x1="48" y1="120" x2="144" y2="120"/>
    
    <!-- Border -->
    <rect x="48" y="48" width="96" height="96" rx="4"/>
  </g>
  
  <!-- Small marker dots -->
  <circle cx="72" cy="60" r="3" fill="white"/>
  <circle cx="120" cy="84" r="3" fill="white"/>
  <circle cx="84" cy="108" r="3" fill="white"/>
  <circle cx="132" cy="132" r="3" fill="white"/>
</svg>